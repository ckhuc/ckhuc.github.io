<div class="container">
  <h1>So... about our next date 👀</h1>

  <p class="intro">
    I had a really good time with you, so I made this extremely official website
    to plan our next date.
  </p>

  <h2>Pick your date:</h2>

  <div class="options" id="dateOptions">
    <button onclick="showDateTime('Rock Climbing')">🧗 Rock Climbing</button>
    <button onclick="showDateTime('Escape Room')">🔐 Escape Room</button>
    <button onclick="showDateTime('Movie')">🎬 Movie</button>
  </div>

  <div id="dateTimeSection" class="hidden">
    <p id="chosenDateText"></p>

    <label for="date">Pick a day:</label>
    <input type="date" id="date">

    <label for="time">Pick a time:</label>
    <select id="time">
      <option value="">Choose a time</option>
      <option value="5:00 PM">5:00 PM</option>
      <option value="5:30 PM">5:30 PM</option>
      <option value="6:00 PM">6:00 PM</option>
      <option value="6:30 PM">6:30 PM</option>
      <option value="7:00 PM">7:00 PM</option>
      <option value="7:30 PM">7:30 PM</option>
      <option value="8:00 PM">8:00 PM</option>
      <option value="8:30 PM">8:30 PM</option>
      <option value="9:00 PM">9:00 PM</option>
    </select>

    <button class="submit-btn" onclick="showFinalAnswer()">Lock it in 💌</button>
  </div>

  <p id="finalResult"></p>

  <p class="small-text">
    Screenshot this and send it to me so I know your pick 😌
  </p>
</div>
