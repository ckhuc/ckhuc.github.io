<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Night?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>So... about our next date 👀</h1>

    <p class="intro">
      I had a really good time with you, so I made this extremely official website
      to ask what you’d want to do next.
    </p>

    <h2>Pick your date:</h2>

    <div class="options">
      <button onclick="pickDate('rock climbing')">🧗 Rock Climbing</button>
      <button onclick="pickDate('escape room')">🔐 Escape Room</button>
      <button onclick="pickDate('movie')">🎬 Movie</button>
    </div>

    <p id="result"></p>

    <p class="small-text">
      No pressure... but the website is legally binding.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
